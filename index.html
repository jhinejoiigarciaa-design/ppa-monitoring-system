<!DOCTYPE html>
<html>
<head>
<title>PPA Monitoring System</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'Segoe UI';background:#eef2f7;padding:15px;}
h1{text-align:center;}

.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:10px;}
.card{padding:10px;color:white;border-radius:8px;text-align:center;}
.total{background:#34495e;} .completed{background:#27ae60;} .ongoing{background:#f39c12;}
.pipeline{background:#e74c3c;} .forimpl{background:#6c5ce7;} .util{background:#16a085;} .unutil{background:#c0392b;}

.formbox{background:white;padding:8px;border-radius:8px;margin-bottom:10px;}
input,select,button{padding:6px;margin:4px;border-radius:5px;}

table{width:100%;background:white;border-radius:8px;border-collapse:collapse;}
th,td{padding:8px;text-align:center;border-bottom:1px solid #ddd;}
th{background:#2c3e50;color:white;}

.progress{background:#ddd;height:8px;border-radius:8px;}
.progress-bar{height:8px;background:#27ae60;border-radius:8px;}
</style>
</head>

<body>

<h1>PPA Monitoring System</h1>

<div class="formbox">
  <input id="code" placeholder="Code">
  <input id="desc" placeholder="Description">
  <input id="budget" type="number" placeholder="Budget">
  <input id="progress" type="number" placeholder="Progress %">

  <select id="status" onchange="autoProgress()">
    <option>Completed</option>
    <option>Ongoing</option>
    <option>Pipeline</option>
    <option>For Implementation</option>
  </select>

  <select id="fund">
    <option>Utilized</option>
    <option>Unutilized</option>
  </select>

  <button id="mainBtn" onclick="quickAdd(true)">Quick Add + Sheet</button>
</div>

<div class="formbox">
  <input id="search" placeholder="Search">
  <button onclick="searchData()">Search</button>
  <button onclick="refreshTable()">Refresh</button>
</div>

<table id="ppaTable"></table>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyp48afWyRgSVsxaE80HFTccI77oW-ARxPi18-GxAyZkHw_9rUovuzt-JCo1fGqcKHSnA/exec";

let allData = [];
let editIndex = -1;

function autoProgress(){
  if(document.getElementById("status").value === "Completed"){
    document.getElementById("progress").value = 100;
  }
}

// ✅ ADD / UPDATE
async function quickAdd(saveToSheet=false){

  const c = code.value;
  const d = desc.value;
  const b = budget.value || 0;
  const s = status.value;
  const p = (s === "Completed") ? 100 : (progress.value || 0);
  const f = fund.value;

  if(!c || !d){
    alert("Please fill required fields");
    return;
  }

  if(!saveToSheet) return;

  let actionType = "addData";

  const paramsObj = {
    code: c,
    desc: d,
    budget: b,
    status: s,
    progress: p,
    fund: f
  };

  if(editIndex !== -1){
    actionType = "updateData";
    paramsObj.rowIndex = allData[editIndex][6];
  }

  const params = new URLSearchParams({
    action: actionType,
    ...paramsObj
  });

  try {
    await fetch(`${API_URL}?${params}`);
    await loadFromSheet();

    clearForm();
    editIndex = -1;
    mainBtn.innerText = "Quick Add + Sheet";

  } catch(e){
    console.error(e);
    alert("Connection error");
  }
}

function clearForm(){
  code.value = "";
  desc.value = "";
  budget.value = "";
  progress.value = "";
}

// ✅ EDIT
function editRow(i){
  const r = allData[i];

  code.value = r[0];
  desc.value = r[1];
  budget.value = r[2];
  progress.value = r[4];

  // status safe mapping
  const statusSelect = document.getElementById("status");
  const rawStatus = (r[3] || "").toString().trim().toLowerCase();

  const statusMap = {
    "completed": "Completed",
    "ongoing": "Ongoing",
    "pipeline": "Pipeline",
    "for implementation": "For Implementation"
  };

  statusSelect.value = statusMap[rawStatus] || "Ongoing";

  // fund safe
  const rawFund = (r[5] || "").toString().trim().toLowerCase();
  fund.value = rawFund === "utilized" ? "Utilized" : "Unutilized";

  editIndex = i;
  mainBtn.innerText = "Update";
}

// ✅ DELETE
async function deleteRow(i){
  if(confirm("Delete?")){
    const rowIndex = allData[i][6];

    const params = new URLSearchParams({
      action: "deleteData",
      rowIndex: rowIndex
    });

    await fetch(`${API_URL}?${params}`);
    loadFromSheet();
  }
}

// ✅ TABLE
function renderTable(data){
  let html = `<tr>
    <th>Code</th>
    <th>Description</th>
    <th>Budget</th>
    <th>Status</th>
    <th>Progress</th>
    <th>Fund</th>
    <th>Action</th>
  </tr>`;

  data.forEach((r,i)=>{
    html += `<tr>
      <td>${r[0]}</td>
      <td>${r[1]}</td>
      <td>${r[2]}</td>
      <td>${r[3]}</td>
      <td>
        <div class="progress">
          <div class="progress-bar" style="width:${r[4]}%"></div>
        </div>
        ${r[4]}%
      </td>
      <td>${r[5]}</td>
      <td>
        <button onclick="editRow(${i})">Edit</button>
        <button onclick="deleteRow(${i})">Del</button>
      </td>
    </tr>`;
  });

  ppaTable.innerHTML = html;
}

// ✅ SEARCH
function searchData(){
  const val = search.value.toLowerCase();
  const filtered = allData.filter(r =>
    r.join(" ").toLowerCase().includes(val)
  );
  renderTable(filtered);
}

// ✅ LOAD DATA
async function loadFromSheet(){
  try{
    const res = await fetch(`${API_URL}?action=getData`);
    const json = await res.json();

    if(json.status === "success"){
      allData = json.data;
      refreshTable();
    }
  } catch(e){
    console.error("LOAD ERROR:", e);
  }
}

// ✅ REFRESH
function refreshTable(){
  renderTable(allData);
}

loadFromSheet();
</script>

</body>
</html>
